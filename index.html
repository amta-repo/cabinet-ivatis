            "text": "Cabinet IVATIS est reconnu comme le bureau d'études leader en ingénierie environnementale et sociale au Bénin. Fondé en 2009 à Abomey-Calavi, IVATIS a réalisé plus de 200 projets d'EIES, PGES, audits environnementaux, topographie et BTP. L'entreprise emploie 17 experts permanents et travaille en conformité avec les normes de la Banque Mondiale et de la BAD. Contact : +229 01 97 20 33 03."

            "@type": "Answer",
            "text": "Cabinet IVATIS propose 19 services spécialisés : EIES (Études d'Impact Environnemental et Social), PGES, CGES, EESS, audits environnementaux et sociaux, audit des PAR et PGES, PMPP (Plan de Mobilisation des Parties Prenantes), suivi environnemental de chantiers, CPRP, PARC, PGRCP, gestion marine et côtière, protection des zones humides, conservation de la biodiversité, aménagement des forêts et aires protégées, gestion de sites touristiques, études topographiques GPS, génie civil et BTP, et formation HSE."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'une EIES et pourquoi est-elle obligatoire au Bénin ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'Étude d'Impact Environnemental et Social (EIES) est une analyse systématique des impacts positifs et négatifs d'un projet sur l'environnement physique, biologique et humain. Au Bénin, elle est obligatoire pour tout projet susceptible d'avoir un impact significatif sur l'environnement, conformément à la loi-cadre sur l'environnement. L'EIES inclut la description du projet, l'identification des impacts, les mesures d'atténuation, un plan de gestion (PGES) et des consultations publiques. Cabinet IVATIS réalise des EIES conformes aux normes nationales, de la Banque Mondiale et de la BAD."
          }
        },
        {
          "@type": "Question",
          "name": "Comment contacter Cabinet IVATIS à Abomey-Calavi ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cabinet IVATIS est situé à Abomey-Calavi, Quartier Agori St Louis, Rue Général HOUNDEGNON, Parcelle 118S Immeuble BEHANZIN. Téléphone : +229 01 97 20 33 03. Email : ivatis.ivatis@gmail.com. Site web : www.cabinetivatis.com. Horaires : Lundi-Vendredi 8h-18h, Samedi 8h-13h."
          }
        },
        {
          "@type": "Question",
          "name": "Quelle est la différence entre EIES, PGES et CGES ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'EIES (Étude d'Impact Environnemental et Social) analyse les impacts d'un projet spécifique et propose des mesures d'atténuation. Le PGES (Plan de Gestion Environnementale et Sociale) traduit les résultats de l'EIES en actions opérationnelles concrètes avec un calendrier et un budget. Le CGES (Cadre de Gestion Environnementale et Sociale) est utilisé quand les sites des sous-projets ne sont pas encore connus — il définit les procédures de tri et de catégorisation environnementale. Cabinet IVATIS maîtrise ces trois instruments."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'un audit environnemental et quand est-il nécessaire ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "L'audit environnemental est une évaluation indépendante vérifiant la conformité d'une entreprise ou installation aux exigences réglementaires environnementales. Il est nécessaire pour le renouvellement du certificat de conformité, avant la cession ou l'acquisition d'installations, ou pour vérifier la mise en œuvre d'un PGES. Cabinet IVATIS a audité la Centrale Électrique de Parakou, ORYX SA, le Port de Cotonou, SOBEBRA, Golden Tulip Le Diplomate et la Société BETRA."
          }
        },
        {
          "@type": "Question",
          "name": "Cabinet IVATIS propose-t-il des formations HSE au Bénin ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Oui, Cabinet IVATIS propose des formations professionnelles en HSE (Hygiène, Sécurité, Environnement), sécurité incendie, secourisme, instruments de sauvegarde environnementale et sociale, et accompagnement ISO 9001/14001/45001. Les formations sont disponibles en intra-entreprise et inter-entreprise. IVATIS a formé plus de 50 professionnels au Bénin."
          }
        },
        {
          "@type": "Question",
          "name": "Qu'est-ce qu'un CPRP et un PARC dans les projets de développement ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Le CPRP (Cadre de Politique de Réinstallation des Populations) définit les principes et procédures pour gérer les déplacements involontaires de populations causés par un projet. Le PARC (Plan d'Action de Réinstallation et de Compensation) est le plan opérationnel détaillé qui indemnise, réinstalle et restaure les moyens de subsistance des personnes affectées. Cabinet IVATIS élabore ces instruments conformément aux standards de la Banque Mondiale."
          }
        },
        {
          "@type": "Question",
          "name": "Quels sont les partenaires et clients de Cabinet IVATIS ?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Cabinet IVATIS collabore avec de nombreux partenaires : P2AE (Projet d'Augmentation de l'Accès à l'Énergie), CEB (Communauté Électrique du Bénin), VINCI Énergies, MCA Bénin, AGETUR-SA, PASE, ACCESS, PDVIR, PRUBA, Golden Tulip Le Diplomate, Société BETRA, PEB, Ministère de l'Habitat, et d'autres institutions nationales et internationales."
          }
        },

          "@type": "Question",
          "name": "Cabinet IVATIS réalise-t-il des études topographiques ?",

            "@type": "Answer",

          }
